[span_0](start_span)name: Update StarCode Celebrity Node[span_0](end_span)

on:
  schedule:
    - [span_1](start_span)cron: '*/30 * * * *' # تحديث مستمر لضمان تدفق "التريند" والأرباح[span_1](end_span)
  [span_2](start_span)workflow_dispatch: # إمكانية التفعيل اليدوي عند رصد تسريبات عاجلة[span_2](end_span)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          [span_3](start_span)python-version: '3.10' # بيئة معالجة مستقرة[span_3](end_span)

      - name: Install dependencies
        run: |
          [span_4](start_span)pip install requests beautifulsoup4 lxml[span_4](end_span)

      - name: Run Scraper
        # تأكد أن اسم الملف هنا يطابق اسم ملف البايثون الذي حفظته (مثلاً scraper.py)
        run: python scraper.py 

      - name: Commit and Push
        run: |
          [span_5](start_span)git config --global user.name "GitHub Actions"[span_5](end_span)
          [span_6](start_span)git config --global user.email "actions@github.com"[span_6](end_span)
          git add index.html
          # تعديل الرسالة لتعكس تحديثات المشاهير والأضواء
          [span_7](start_span)git commit -m "VIP Update: StarCode Feed $(date)" || echo "No changes to commit"[span_7](end_span)
          git push
