name: Update Stadium 24 Sport

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          [span_2](start_span)python-version: '3.10'[span_2](end_span)

      - name: Install dependencies
        run: |
          [span_3](start_span)pip install requests beautifulsoup4[span_3](end_span)

      - name: Run Scraper
        [span_4](start_span)run: python scraper.py[span_4](end_span)

      - name: Commit and Push
        run: |
          [span_5](start_span)git config --global user.name "GitHub Actions"[span_5](end_span)
          [span_6](start_span)git config --global user.email "actions@github.com"[span_6](end_span)
          git add index.html
          [span_7](start_span)git commit -m "Auto Update: $(date)" || echo "No changes"[span_7](end_span)
          git push
