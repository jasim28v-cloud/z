name: Update Celeb Glam Portal

on:
  schedule:
    - cron: '*/30 * * * *' # تحديث تلقائي كل 30 دقيقة لجلب أحدث التريندات
  workflow_dispatch: # إمكانية التشغيل اليدوي للمهمة

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run Celeb Scraper
        run: python main.py # تأكد أن اسم ملف البوت الخاص بك هو main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "Auto Update Celeb Trends: $(date)" || echo "No changes to commit"
          git push
