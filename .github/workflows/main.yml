name: Update Stadium 24 Sport

on:
  schedule:
    - cron: '*/30 * * * *' # التحديث التلقائي كل 30 دقيقة لضمان تدفق الأرباح
  workflow_dispatch: # إمكانية تشغيل البوت يدوياً عند الحاجة

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # استخدام نسخة مستقرة وحديثة

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run Scraper
        run: python scraper.py # تشغيل ملف جلب الأخبار الرياضية

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "Auto Update Stadium 24: $(date)" || echo "No changes to commit"
          git push
